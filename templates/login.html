<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI CareerConnect | Secure Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #020617;
            color: #f1f5f9;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Fixed Background Layers */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; /* Lowest */
            pointer-events: none;
        }

        .ambient-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(96,165,250,0.08), transparent 70%);
            z-index: 2;
            pointer-events: none;
        }

        /* Navbar */
        .navbar {
            background: rgba(5, 10, 25, 0.65);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(96,165,250,0.2);
            z-index: 1000;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        /* Login Wrapper */
        .login-wrapper {
            position: relative;
            z-index: 20; /* High priority visibility */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
        }

        .login-card {
            max-width: 450px;
            width: 100%;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(25px);
            border-radius: 32px;
            padding: 2.5rem;
            border: 1px solid rgba(96, 165, 250, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .icon-circle {
            width: 60px;
            height: 60px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(96, 165, 250, 0.4);
            margin-bottom: 1rem;
        }

        .icon-circle i { font-size: 1.5rem; color: #60a5fa; }

        .title { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
        .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }

        /* Form Controls */
        .form-group { position: relative; margin-bottom: 1.25rem; text-align: left; }
        .form-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #60a5fa; }

        .form-control-custom {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(2, 6, 23, 0.6);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 14px;
            color: white;
            transition: all 0.3s;
        }

        .form-control-custom:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.1);
        }

        /* The Button - High Visibility Fix */
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(95deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
            margin-top: 1rem;
            transition: 0.3s;
            position: relative;
            z-index: 30; /* Highest level within card */
        }

        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(59, 130, 246, 0.5); filter: brightness(1.1); }

        .demo-hint {
            background: rgba(96, 165, 250, 0.05);
            border-radius: 12px;
            padding: 12px;
            margin: 1.5rem 0;
            font-size: 0.75rem;
            color: #94a3b8;
            border: 1px dashed rgba(96, 165, 250, 0.2);
        }

        .footer-text a { color: #60a5fa; text-decoration: none; font-weight: 600; }
        
        footer { position: relative; z-index: 10; padding: 20px; text-align: center; font-size: 0.8rem; color: #475569; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="ambient-glow"></div>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand logo" href="/">
            <i class="fas fa-microchip me-2"></i> AI CareerConnect
        </a>
    </div>
</nav>

<div class="login-wrapper">
    <div class="login-card">
        <div class="icon-circle">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h1 class="title">Welcome Back</h1>
        <p class="subtitle">Secure access to your AI dashboard</p>

        <form action="/login" method="POST" id="loginForm">
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" class="form-control-custom" placeholder="Email Address" required>
            </div>

            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" class="form-control-custom" placeholder="Password" required>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span>Login to Dashboard</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="demo-hint">
            <strong>Demo:</strong> employee@aicareer.com | demo123
        </div>

        <div class="footer-text mt-4">
            New here? <a href="/register">Create Account</a>
        </div>
    </div>
</div>

<footer>
    &copy; 2026 AI CareerConnect — Powering the Future of Work
</footer>

<script type="module">
    import * as THREE from 'three';
    
    const canvas = document.getElementById('bg-canvas');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 12;
    
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    
    const starsGeo = new THREE.BufferGeometry();
    const starsCount = 2000;
    const pos = new Float32Array(starsCount * 3);
    for(let i=0; i<starsCount*3; i++) pos[i] = (Math.random() - 0.5) * 50;
    starsGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    
    const starsMat = new THREE.PointsMaterial({ size: 0.05, color: 0x60a5fa, transparent: true, opacity: 0.8 });
    const starField = new THREE.Points(starsGeo, starsMat);
    scene.add(starField);

    function animate() {
        requestAnimationFrame(animate);
        starField.rotation.y += 0.0008;
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

<script>
    // Reveal animations
    gsap.from(".login-card", { opacity: 0, y: 40, duration: 1, ease: "power4.out" });
    gsap.from(".form-group", { opacity: 0, x: -10, stagger: 0.1, duration: 0.6, delay: 0.4 });
    gsap.from("#loginBtn", { opacity: 1, scale: 0.95, duration: 0.5, delay: 0.8 }); // Ensure opacity is 1
</script>

</body>
</html>
